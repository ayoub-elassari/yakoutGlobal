<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>اتصال بنا · تعلم الألمانية</title>
  <!-- Cairo font for modern Arabic -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: #d4e0ec;  /* soft blue-gray base */
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      /* subtle organic shape in background */
      position: relative;
      overflow-x: hidden;
    }

    /* background large organic shapes (blob) */
    body::before {
      content: "";
      position: absolute;
      width: 600px;
      height: 600px;
      background: rgba(235, 245, 255, 0.6);
      border-radius: 62% 38% 42% 58% / 37% 53% 47% 63%;
      top: -200px;
      left: -200px;
      z-index: 0;
      filter: blur(40px);
    }

    body::after {
      content: "";
      position: absolute;
      width: 700px;
      height: 700px;
      background: rgba(255, 224, 178, 0.3);
      border-radius: 75% 25% 70% 30% / 30% 70% 30% 70%;
      bottom: -300px;
      right: -200px;
      z-index: 0;
      filter: blur(60px);
    }

    .card {
      position: relative;
      z-index: 10;
      max-width: 1100px;
      width: 100%;
      background: #FFFFFF;
      border-radius: 70px 70px 70px 70px / 60px 60px 60px 60px;
      box-shadow: 0 40px 70px -10px rgba(12, 35, 55, 0.25), 0 10px 30px rgba(0, 20, 30, 0.1);
      overflow: hidden;
      /* subtle organic corner shaping (additional wave) */
      border-bottom-right-radius: 120px 80px;
      border-top-left-radius: 100px 100px;
      transition: transform 0.2s;
    }

    /* main grid: 40% colored side, 60% content side — but we make colored wider for shapes */
    .card-inner {
      display: grid;
      grid-template-columns: 40% 60%;
    }

    /* ===== RIGHT SIDE: COLOR, SHAPES, VISUAL ===== */
    .color-shape-side {
      background: #164863;  /* deep tealish blue */
      background-image: radial-gradient(circle at 20% 30%, #2875a7, #0a2f44);
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 3rem 1.5rem;
      color: white;
      text-align: center;
      isolation: isolate;
      min-height: 500px;
    }

    /* overlapping organic shapes inside the colored side (circles, blobs) */
    .color-shape-side::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 0% 80%, rgba(242, 182, 65, 0.25) 0%, transparent 40%),
                  radial-gradient(circle at 90% 10%, #f2b64140 0%, transparent 40%),
                  linear-gradient(125deg, #1f6e9e20 0%, transparent 50%);
      z-index: 1;
      pointer-events: none;
    }

    /* main floating abstract shape (large half-circle / wave) */
    .color-shape-side .big-blob {
      position: absolute;
      width: 350px;
      height: 350px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 73% 27% 60% 40% / 42% 44% 56% 58%;
      top: -100px;
      right: -70px;
      z-index: 0;
      border: 2px solid rgba(255,255,240,0.1);
      transform: rotate(15deg);
    }

    .color-shape-side .small-blob {
      position: absolute;
      width: 200px;
      height: 200px;
      background: rgba(242, 182, 65, 0.1);
      border-radius: 40% 60% 70% 30% / 40% 50% 50% 60%;
      bottom: -30px;
      left: -40px;
      z-index: 0;
      border: 2px dashed rgba(255,215,120,0.2);
    }

    /* wavy line decoration */
    .color-shape-side .wave-line {
      position: absolute;
      width: 120%;
      height: 80px;
      background: repeating-linear-gradient( -45deg, transparent 0px, transparent 12px, rgba(255,255,240,0.1) 12px, rgba(242,182,65,0.15) 18px);
      bottom: 30px;
      left: -20px;
      transform: rotate(3deg);
      z-index: 1;
      border-radius: 40%;
    }

    /* content inside colored side (icon and title) */
    .side-content {
      position: relative;
      z-index: 5;
      max-width: 280px;
    }

    .shape-icon {
      font-size: 5rem;
      line-height: 1;
      filter: drop-shadow(0 10px 12px #00000030);
      background: rgba(255,255,255,0.08);
      width: 130px;
      height: 130px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      border-radius: 48% 52% 34% 66% / 57% 41% 59% 43%;
      border: 2px solid rgba(255,220,140,0.25);
      backdrop-filter: blur(4px);
    }

    .side-content h2 {
      font-size: 2.5rem;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 0.75rem;
      text-shadow: 0 2px 10px #00000040;
    }

    .side-content h2 span {
      font-weight: 300;
      display: block;
      font-size: 1.5rem;
      opacity: 0.9;
      letter-spacing: 1px;
    }

    .side-content .badge {
      background: #f2b641;
      color: #0a2f44;
      font-weight: 800;
      padding: 0.5rem 1.5rem;
      border-radius: 100px;
      display: inline-block;
      font-size: 1.2rem;
      margin-top: 1rem;
      box-shadow: 0 8px 18px #00000030;
      border: 2px solid #ffe6b3;
    }

    /* ===== LEFT SIDE (content) with shapes and colors ===== */
    .content-shape-side {
      background: #F8FAFE;
      padding: 3rem 2.8rem 3rem 2.8rem;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    /* organic background shapes inside content side */
    .content-shape-side::before {
      content: "";
      position: absolute;
      width: 400px;
      height: 400px;
      background: rgba(242, 182, 65, 0.03);
      border-radius: 63% 37% 48% 52% / 51% 44% 56% 49%;
      top: -150px;
      left: -150px;
      z-index: 0;
      border: 2px solid rgba(242,182,65,0.1);
    }

    .content-shape-side::after {
      content: "";
      position: absolute;
      width: 300px;
      height: 300px;
      background: rgba(22, 72, 99, 0.02);
      border-radius: 40% 60% 28% 72% / 56% 29% 71% 44%;
      bottom: -100px;
      right: -80px;
      z-index: 0;
      border: 2px dashed #16486320;
      transform: rotate(20deg);
    }

    /* small corner shapes */
    .dot-pattern {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 90px;
      height: 90px;
      background: radial-gradient(circle at 30% 30%, #f2b64140 4px, transparent 4px), 
                  radial-gradient(circle at 70% 70%, #16486330 6px, transparent 6px);
      background-size: 20px 20px, 30px 30px;
      opacity: 0.5;
      z-index: 1;
      border-radius: 50%;
    }

    .slash-shape {
      position: absolute;
      bottom: 30px;
      left: 20px;
      width: 150px;
      height: 30px;
      background: linear-gradient(110deg, #f2b64120, #16486320);
      transform: skewX(-15deg) rotate(5deg);
      border-radius: 100px;
      z-index: 1;
    }

    /* main tag */
    .section-tag {
      position: relative;
      z-index: 5;
      display: inline-block;
      background: #164863;
      color: white;
      padding: 0.5rem 2rem 0.5rem 2rem;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 1px;
      border-radius: 0 40px 40px 0;
      margin-bottom: 1.8rem;
      align-self: flex-start;
      box-shadow: 8px 8px 0 #f2b641;
      clip-path: polygon(0 0, 90% 0, 100% 50%, 90% 100%, 0 100%);
      padding-left: 2.2rem;
    }

    /* main heading */
    .main-heading {
      position: relative;
      z-index: 5;
      margin-bottom: 1.2rem;
    }

    .main-heading h1 {
      font-size: 3.2rem;
      font-weight: 800;
      line-height: 1.1;
      color: #0b2b3c;
      display: inline-block;
      background: linear-gradient(145deg, #164863, #1f5980);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.25rem;
      text-shadow: 4px 4px 0 #eef4fa;
    }

    .sub-line {
      font-size: 2rem;
      font-weight: 600;
      color: #1d4c6e;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-top: 0.2rem;
      background: #fff7e5;
      padding: 0.3rem 2rem 0.3rem 1.5rem;
      border-radius: 60px;
      width: fit-content;
      border: 2px solid #f2b64160;
      box-shadow: 0 6px 0 #ffe6b3;
    }

    .sub-line span {
      background: #f2b641;
      color: #164863;
      padding: 0.2rem 1.2rem;
      border-radius: 40px;
      font-size: 1.3rem;
      font-weight: 700;
    }

    /* description box with organic shape */
    .description {
      position: relative;
      z-index: 5;
      font-size: 1.25rem;
      font-weight: 500;
      color: #1f405b;
      margin: 2rem 0 2.2rem 0;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(4px);
      padding: 1.8rem 2.5rem 1.8rem 2rem;
      border-radius: 60px 20px 60px 20px;
      border: 2px solid #ffffff;
      box-shadow: 20px 20px 0 #d3e3f0, 0 10px 20px #bacfe0;
      line-height: 1.7;
      clip-path: polygon(92% 0, 100% 8%, 100% 92%, 96% 100%, 4% 100%, 0% 96%, 0 4%, 8% 0);
    }

    /* years badge with shape */
    .years-badge {
      position: relative;
      z-index: 5;
      background: #164863;
      color: #f2b641;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      width: fit-content;
      padding: 0.5rem 2rem 0.5rem 2rem;
      border-radius: 100px 30px 30px 100px;
      margin-bottom: 1.5rem;
      border: 3px solid #f2b641;
      font-weight: 700;
      font-size: 1.1rem;
      box-shadow: -8px 8px 0 #ffd98c;
    }

    .years-badge strong {
      background: #f2b641;
      color: #0a2f44;
      padding: 0.3rem 1rem;
      border-radius: 60px;
      font-size: 1.5rem;
      margin-left: 0.5rem;
    }

    /* button with irregular shape */
    .cta-button {
      position: relative;
      z-index: 10;
      background: #f2b641;
      border: none;
      border-radius: 80px 30px 80px 30px;
      padding: 1.2rem 3rem 1.2rem 3.5rem;
      font-size: 1.8rem;
      font-weight: 800;
      font-family: 'Cairo', sans-serif;
      color: #0a2f44;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      width: fit-content;
      box-shadow: 12px 16px 0 #164863, 0 10px 25px #16486370;
      cursor: pointer;
      transition: 0.15s;
      border: 3px solid white;
      transform: rotate(-0.5deg);
      clip-path: polygon(94% 0%, 100% 18%, 100% 82%, 94% 100%, 6% 100%, 0% 82%, 0% 18%, 6% 0%);
    }

    .cta-button:hover {
      background: #ffcb6e;
      transform: rotate(0deg) translateY(-5px);
      box-shadow: 8px 12px 0 #164863, 0 18px 30px #e6a137;
    }

    .cta-button::before {
      content: "←";
      font-size: 2.2rem;
      font-weight: 400;
    }

    /* responsiveness */
    @media (max-width: 800px) {
      .card-inner {
        grid-template-columns: 1fr;
      }
      .color-shape-side {
        min-height: 300px;
      }
      .content-shape-side {
        padding: 2.5rem 2rem;
      }
      .main-heading h1 {
        font-size: 2.6rem;
      }
      .sub-line {
        font-size: 1.5rem;
      }
    }

    @media (max-width: 500px) {
      .card {
        border-radius: 40px;
      }
      .cta-button {
        font-size: 1.4rem;
        padding: 1rem 2rem;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-inner">
      <!-- RIGHT: colored side with shapes and visual elements -->
      <div class="color-shape-side">
        <div class="big-blob"></div>
        <div class="small-blob"></div>
        <div class="wave-line"></div>
        <div class="side-content">
          <div class="shape-icon">
            🇩🇪
          </div>
          <h2>اتصال <span>بنا</span></h2>
          <div class="badge">📍 ألمانيا</div>
        </div>
        <!-- extra tiny shapes -->
        <div style="position: absolute; bottom:20px; right:20px; width:50px; height:50px; border:4px solid #f2b64140; border-radius: 40% 60% 40% 60%;"></div>
      </div>

      <!-- LEFT: content side with colors, shapes, and text -->
      <div class="content-shape-side">
        <!-- decorative shapes -->
        <div class="dot-pattern"></div>
        <div class="slash-shape"></div>
        
        <!-- tag "اتصال بنا" with shape clip -->
        <div class="section-tag">اتصال بنا</div>

        <!-- main titles -->
        <div class="main-heading">
          <h1>تعلم الألمانية</h1>
          <div class="sub-line">
            افتح آفاق مستقبلك
            <span>✨</span>
          </div>
        </div>

        <!-- description with background shape (exact text) -->
        <div class="description">
          منذ أكثر من عشرين عامًا، ونحن نساعد الطلاب على تحقيق أهدافهم الدراسية والمهنية والحياتية في ألمانيا.
        </div>

        <!-- years indicator with colors -->
        <div class="years-badge">
          <strong>+20</strong> عامًا من التميز
        </div>

        <!-- call to action button with irregular shape -->
        <button class="cta-button">
          ابدأ رحلتك اليوم
        </button>

        <!-- additional micro shape (colored dot) -->
        <div style="position:absolute; top:40px; left:20px; width: 60px; height:60px; border-radius: 50%; background: #f2b64120; border: 3px dotted #f2b641; z-index:2;"></div>
      </div>
    </div>
  </div>
</body>
</html>
